<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Character Generator</title>
    <style>
        p{
        color : green ;
      }
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 500px;
            margin: auto;
        }
        h1 {
            text-align: center;
        }
        input, button {
            width: 100%;
            padding: 8px;
            margin: 5px 0 15px;
        }

        /* Drag & Drop Box */
        .drop-zone {
            border: 2px dashed #aaa;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            color: #666;
            margin-bottom: 15px;
            cursor: pointer;
            transition: 0.3s;
        }
        .drop-zone.dragover {
            border-color: #007BFF;
            background-color: #eef6ff;
            color: #007BFF;
        }

        .profile {
            margin-top: 20px;
            background: #e9f5ff;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .profile img {
            max-width: 150px;
            border-radius: 50%;
            margin-bottom: 10px;
        }

        /* Hide actual file input */
        #imageUpload {
            display: none;
        }
    </style>
</head>
     <a href="https://geebob-inc.github.io/webs/" target="_blank">
Check out more from <em>Geebob inc.</em> here: </a>
<body>

<div class="container">
    <h1>Profile Generator</h1>

    <form id="profileForm">
        <input type="text" id="first_name" placeholder="First Name" required>
        <input type="text" id="age" placeholder="Age">
        <input type="text" id="dob" placeholder="Date of Birth (Year)">
        <input type="text" id="season" placeholder="Favorite Season">
        <input type="text" id="color" placeholder="Eye Color">
        <input type="text" id="movie" placeholder="Favorite Movie/TV Show">
        <input type="text" id="holiday" placeholder="Favorite Holiday">
        <input type="text" id="pet" placeholder="Do you have pets?">
        <input type="text" id="place" placeholder="Favorite Place">
        <input type="text" id="job" placeholder="Dream Job">
        <input type="text" id="house" placeholder="Favorite City">

        <!-- Drag & Drop Area -->
        <div class="drop-zone" id="dropZone">
            Drag & Drop Profile Picture Here or Click to Upload
        </div>
        <input type="file" id="imageUpload" accept="image/*">

        <button type="button" onclick="generateProfile()">Generate Profile</button>
    </form>

    <div class="profile" id="output" style="display:none;"></div>
</div>

<script>
let uploadedImage = null;

const dropZone = document.getElementById("dropZone");
const fileInput = document.getElementById("imageUpload");

// Click to open file picker
dropZone.addEventListener("click", () => fileInput.click());

// Handle drag over
dropZone.addEventListener("dragover", (e) => {
    e.preventDefault();
    dropZone.classList.add("dragover");
});

// Handle drag leave
dropZone.addEventListener("dragleave", () => {
    dropZone.classList.remove("dragover");
});

// Handle drop
dropZone.addEventListener("drop", (e) => {
    e.preventDefault();
    dropZone.classList.remove("dragover");
    const file = e.dataTransfer.files[0];
    handleFile(file);
});

// Handle manual file selection
fileInput.addEventListener("change", () => {
    const file = fileInput.files[0];
    handleFile(file);
});

// Convert image to displayable format
function handleFile(file) {
    if (!file || !file.type.startsWith("image/")) {
        alert("Please upload a valid image file.");
        return;
    }

    const reader = new FileReader();
    reader.onload = function(e) {
        uploadedImage = e.target.result;
        dropZone.textContent = "Image uploaded ✔";
    };
    reader.readAsDataURL(file);
}

function generateProfile() {
    const firstName = document.getElementById("first_name").value;
    const age = document.getElementById("age").value;
    const dob = document.getElementById("dob").value;
    const season = document.getElementById("season").value;
    const color = document.getElementById("color").value;
    const movie = document.getElementById("movie").value;
    const holiday = document.getElementById("holiday").value;
    const pet = document.getElementById("pet").value;
    const place = document.getElementById("place").value;
    const job = document.getElementById("job").value;
    const house = document.getElementById("house").value;

    const outputDiv = document.getElementById("output");

    outputDiv.style.display = "block";
    outputDiv.innerHTML = `
        ${uploadedImage ? `<img src="${uploadedImage}" alt="Profile Picture">` : ""}
        <h2>Hello ${firstName}!</h2>
        <p><strong>Age:</strong> ${age}</p>
        <p><strong>Date of Birth (Month):</strong> ${dob}</p>
        <p><strong>Favorite Season:</strong> ${season}</p>
        <p><strong>Eye Color:</strong> ${color}</p>
        <p><strong>Favorite Movie/TV Show:</strong> ${movie}</p>
        <p><strong>Favorite Holiday:</strong> ${holiday}</p>
        <p><strong>Pets:</strong> ${pet}</p>
        <p><strong>Favorite Place:</strong> ${place}</p>
        <p><strong>Dream Job:</strong> ${job}</p>
        <p><strong>Dream House:</strong> ${house}</p>
        <p><strong>Thank you for using this profile generator, ${firstName}!</strong></p>
        <p> Have a great rest of the day!</p>
    `;
}
</script>

</body>
</html>
